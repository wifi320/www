<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warranty sticker validation</title>
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f9;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 15px;
            background-color: #fff;
        }

        .header-content {
            text-align: left;
            margin-bottom: 30px;
        }

        .logo {
            width: 100px;
            margin-bottom: 10px;
        }

        .breadcrumb {
            font-size: 0.9rem;
            color: #777;
            margin: 10px 0 15px 0;
        }

        .breadcrumb a {
            color: #000 !important;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #333 !important;
            text-decoration: underline;
        }

        h2 {
            color: #2c3e50;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin: 20px 0 40px 0;
            letter-spacing: 1px;
        }

        .main-description {
            text-align: center;
            font-weight: normal;
            font-size: 1rem;
            line-height: 1.8;
            max-width: 800px;
            margin: 20px auto 30px auto;
        }
        
        .arabic-text {
            font-family: 'Traditional Arabic', 'Arial Arabic', 'Simplified Arabic', sans-serif;
            font-size: 1rem;
            direction: rtl;
            display: inline-block;
        }
        
        .banner {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            margin: 40px 0;
        }

        .input-instruction {
            text-align: center;
            font-weight: normal;
            font-size: 0.9rem;
            margin: 15px 0;
        }

        .input-container {
            width: 45%;
            max-width: 300px;
            display: flex;
            align-items: center;
            border: 2px solid #cccccc;
            border-radius: 25px 0 0 25px;
            overflow: hidden;
            margin: 10px auto;
            height: 40px;
        }

        .input-container input {
            flex: 1;
            padding: 8px 12px;
            border: none;
            font-size: 0.9rem;
            outline: none;
            border-radius: 25px 0 0 25px;
            text-align: left;
            height: 100%;
        }

        .input-container button {
            padding: 0 20px;
            background-color: #a8822b;
            color: white;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            height: 100%;
            border-radius: 0;
            min-width: 80px;
        }

        .input-container button.pressed {
            background-color: #666 !important;
        }

        #result {
            margin: 20px auto;
            padding: 25px;
            font-size: 1.1rem;
            max-width: 450px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .success { color: #28a745; font-weight: bold; }
        .error { color: #dc3545; font-weight: bold; }

        @media (max-width: 768px) {
            .input-container { width: 80%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-content">
            <img src="https://i.postimg.cc/zvf2c47L/image.png" alt="Website Logo" class="logo">
            <div class="breadcrumb">
                </div>
        </div>

        <h2>Warranty sticker validation</h2>

        <p class="main-description">
            Check if the warranty sticker on your product is genuine.<br>
            تأكد إذا كان ملصق الضمان الموجود على منتجك هو ملصق أصلي أو مزيف
        </p>
 
        <span class="arabic-text">الشكل القديم </span>
        <img src="https://i.postimg.cc/1XhL17mC/Screenshot-20251026-022901.jpg" alt="Banner 1" class="banner">
        
        <span class="arabic-text">الشكل الجديد</span>
        <img src="https://i.ibb.co/3m3r1TWK/Warranty-sticker-26.jpg" alt="Banner 2" class="banner">
        
        <p class="input-instruction">
            Enter the number shown on the sticker in this box<br>
            أدخل الرقم الموجود على الملصق هنا   
        </p>

        <div class="input-container">
            <input type="text" id="numberInput" placeholder="XXXXXX">
            <button type="submit" id="checkBtn" onclick="validateForm(event)">Check</button>
        </div>

        <div id="result"></div>
    </div>
    <div class="bottom-buttons">
        <button class="menu-button">☰</button>
        <button class="home-button">
            <svg class="home-icon" viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" fill="none" stroke="currentColor" stroke-width="2"/>
            </svg>
        </button>
    </div>


     
    <script>
        // --- إعدادات Supabase ---
        // بما أنك وضعت المفاتيح في GitHub Secrets، يمكنك وضعها هنا مباشرة 
        // الـ Anon Key مصمم ليكون عاماً طالما أنك تستخدمه للتحقق فقط
        const SUPABASE_URL = 'https://jcxysqjhfoabcsobfvts.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__d_8ybJ6m0dzK75GFJ5nMg_hWV3oOSx';

                // --- إعدادات Supabase النهائية ---

        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function validateForm(event) {
            event.preventDefault();
            const input = document.getElementById("numberInput").value.trim().toUpperCase();
            const resultElement = document.getElementById("result");
            const button = document.getElementById("checkBtn");

            if (!input) return;

            // تغيير حالة الزر أثناء التحقق
            button.disabled = true;
            button.classList.add('pressed');
            resultElement.textContent = "Checking... جاري التحقق...";
            resultElement.className = '';

            try {
                // 1. البحث عن الرمز في قاعدة البيانات
                const { data, error } = await _supabase
                    .from('verification_codes')
                    .select('*')
                    .eq('code', input)
                    .single();

                if (error || !data) {
                    resultElement.textContent = "Code not found ❌ هذا الرمز غير موجود !";
                    resultElement.className = 'error';
                } else if (data.is_used) {
                    resultElement.textContent = "This code has already been used ❌ تم استخدام هذا الرمز مسبقاً !";
                    resultElement.className = 'error';
                } else {
                    // 2. إذا كان الرمز صحيحاً وغير مستخدم، نقوم بتعطيله فوراً
                    const { error: updateError } = await _supabase
                        .from('verification_codes')
                        .update({ is_used: true })
                        .eq('id', data.id);

                    if (updateError) throw updateError;

                    resultElement.textContent = "The code is correct ✅ هذا الرمز صحيح";
                    resultElement.className = 'success';
                }
            } catch (err) {
                console.error(err);
                resultElement.textContent = "Error ❌ حدث خطأ في الاتصال";
                resultElement.className = 'error';
            } finally {
                button.disabled = false;
                button.classList.remove('pressed');
            }
        }

        // دعم زر Enter
        document.getElementById('numberInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') validateForm(e);
        });
    </script>
</body>
</html>
